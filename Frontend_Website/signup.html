<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — NeuralNFT Validator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0e;
      --surface:   #141416;
      --surface2:  #1c1c1f;
      --border:    #2a2a2e;
      --accent:    #f0a500;
      --text:      #f0ede8;
      --muted:     #6b6b70;
      --error:     #ff4747;
      --success:   #47ff8f;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .noise-overlay {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 72px;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 18px;
      color: #0c0c0e;
    }

    .nav-logo-text {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }

    .auth-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 48px;
      letter-spacing: 0.03em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .terms-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .terms-label input { accent-color: var(--accent); margin-top: 2px; flex-shrink: 0; }

    .terms-label a { color: var(--accent); text-decoration: none; }
    .terms-label a:hover { text-decoration: underline; }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0c0c0e;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      margin-bottom: 24px;
    }

    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .auth-switch {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-switch a:hover { text-decoration: underline; }

    .perks {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
      padding: 16px;
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .perk {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .perk-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">N</div>
      <span class="nav-logo-text">NeuralNFT</span>
    </a>
  </nav>

  <div class="page-wrap">
    <div class="auth-card">
      <div class="auth-label">— get started</div>
      <h1 class="auth-title">Sign Up</h1>
      <p class="auth-subtitle">Validate NFTs for free. No credit card required.</p>

      <div class="perks">
        <div class="perk"><div class="perk-dot"></div>9,761 NFTs in our validation database</div>
        <div class="perk"><div class="perk-dot"></div>ResNet50 deep visual similarity engine</div>
        <div class="perk"><div class="perk-dot"></div>Instant safety verdict before you mint</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input type="text" class="form-input" placeholder="John" />
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input type="text" class="form-input" placeholder="Doe" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-input" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="Min. 8 characters" />
      </div>

      <label class="terms-label">
        <input type="checkbox" />
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </label>

      <button class="submit-btn" onclick="window.location.href='index.html'">Create Account →</button>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>
